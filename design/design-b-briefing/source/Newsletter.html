<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Retail Read · Newsletter design directions</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400;1,6..72,500;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; }
  body { background: #f0eee9; }
  ::selection { background: rgba(249, 99, 2, .18); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="newsletter-shared.jsx"></script>
<script type="text/babel" src="d1-read.jsx"></script>
<script type="text/babel" src="d2-briefing.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
  const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect,
          TweakColor, TweakToggle } = window;

  // EDITMODE block — defaults persist when you tweak.
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#F96302",
    "typePair": "modern",
    "density": "regular",
    "heroTreatment": "image",
    "showCloudera": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    return (
      <>
        <DesignCanvas>
          <DCSection
            id="directions"
            title="The Retail Read · Issue 01 · two design directions"
            subtitle="Same content, two voices. Tweak the panel (toolbar) to compare across accent, type, density, hero and brand."
          >
            <DCArtboard id="read" label="A · The Read (tech-publication)" width={760} height={4800}>
              <ReadNewsletter t={t} />
            </DCArtboard>
            <DCArtboard id="briefing" label="B · Briefing (editorial newspaper)" width={760} height={3900}>
              <BriefingNewsletter t={t} />
            </DCArtboard>
          </DCSection>

          <DCPostIt top={120} left={36} rotate={-3} width={220}>
            Hero, byline photo, and Cloudera mark are placeholders. Toggle them
            via the Tweaks panel (bottom-right).
          </DCPostIt>
        </DesignCanvas>

        <TweaksPanel title="Newsletter tweaks">
          <TweakSection label="Brand" />
          <TweakColor label="Accent"
            value={t.accent}
            options={['#F96302', '#1B3A66', '#A8321F', '#15110d']}
            onChange={(v) => setTweak('accent', v)} />
          <TweakToggle label="Cloudera mark on"
            value={t.showCloudera}
            onChange={(v) => setTweak('showCloudera', v)} />

          <TweakSection label="Type & rhythm" />
          <TweakSelect label="Type pair"
            value={t.typePair}
            options={[
              { value: 'modern',    label: 'Modern (Jakarta + Instrument)' },
              { value: 'editorial', label: 'Editorial (Newsreader-led)' },
              { value: 'mixed',     label: 'Mixed (serif head, sans body)' },
            ]}
            onChange={(v) => setTweak('typePair', v)} />
          <TweakRadio label="Density"
            value={t.density}
            options={['airy', 'regular', 'compact']}
            onChange={(v) => setTweak('density', v)} />

          <TweakSection label="Hero" />
          <TweakRadio label="Hero treatment"
            value={t.heroTreatment}
            options={['image', 'type', 'chart']}
            onChange={(v) => setTweak('heroTreatment', v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
